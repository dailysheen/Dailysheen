<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>সংবাদ | Daily Sheen</title>

<meta
  name="description"
  content="Daily Sheen - বিস্তারিত সংবাদ"
>

<link
  rel="stylesheet"
  href="style.css"
>

<style>

/* =====================================
   Daily Sheen V7
   News Details Page
===================================== */

.news-details-page {

  max-width: 1000px;

  margin: 40px auto;

  padding: 0 20px;

}

.news-details-card {

  background: #ffffff;

  border-radius: 18px;

  padding: 30px;

  box-shadow:
    0 10px 35px
    rgba(0,0,0,0.12);

}

.news-details-category {

  display: inline-block;

  padding: 7px 14px;

  margin-bottom: 15px;

  border-radius: 20px;

  background:
    linear-gradient(
      135deg,
      #6a11cb,
      #2575fc
    );

  color: #ffffff;

  font-size: 14px;

  font-weight: bold;

}

.news-details-title {

  font-size: 36px;

  line-height: 1.4;

  color: #222;

  margin-bottom: 15px;

}

.news-details-date {

  color: #777;

  font-size: 14px;

  margin-bottom: 25px;

}

.news-details-image {

  width: 100%;

  max-height: 550px;

  object-fit: cover;

  border-radius: 15px;

  margin-bottom: 25px;

}

.news-details-description {

  color: #333;

  font-size: 18px;

  line-height: 2;

  white-space: pre-line;

}

.back-home-btn {

  display: inline-block;

  margin-top: 30px;

  padding: 12px 22px;

  border-radius: 8px;

  color: #ffffff;

  background:
    linear-gradient(
      135deg,
      #6a11cb,
      #2575fc
    );

  text-decoration: none;

  font-weight: bold;

}

.back-home-btn:hover {

  transform: translateY(-2px);

}

.news-loading {

  text-align: center;

  padding: 50px;

  font-size: 18px;

}

.news-error {

  text-align: center;

  padding: 40px;

  color: #c62828;

}


/* Dark Mode */

body.dark .news-details-card {

  background: #1e1e1e;

}

body.dark .news-details-title {

  color: #ffffff;

}

body.dark .news-details-description {

  color: #eeeeee;

}

body.dark .news-details-date {

  color: #bbbbbb;

}


/* Mobile */

@media (max-width: 600px) {

  .news-details-page {

    margin: 20px auto;

    padding: 0 12px;

  }

  .news-details-card {

    padding: 20px 15px;

  }

  .news-details-title {

    font-size: 25px;

  }

  .news-details-description {

    font-size: 16px;

    line-height: 1.8;

  }

  .news-details-image {

    max-height: 350px;

  }

}

</style>

</head>


<body>

</div>

</div>

</div>

</div>

================================= -->
