<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sheen Admin Login</title>

    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="login-box">

    <img src="assets/logo.png" class="logo">

    <h2>Daily Sheen Admin</h2>

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button id="loginBtn">
        Login
    </button>

    <p id="msg"></p>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
