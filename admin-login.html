<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Admin Login | Daily Sheen</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(
        135deg,
        #4b0082,
        #008f5a
      );
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      padding: 35px 25px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo h1 {
      color: #4b0082;
      font-size: 30px;
      margin-bottom: 5px;
    }

    .logo p {
      color: #666;
      font-size: 14px;
    }

    .login-box h2 {
      text-align: center;
      margin: 20px 0;
      color: #222;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      font-weight: bold;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    .form-group input:focus {
      border-color: #4b0082;
      box-shadow: 0 0 0 3px rgba(75,0,130,0.1);
    }

    #loginBtn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(
        90deg,
        #4b0082,
        #008f5a
      );
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    #loginBtn:hover {
      opacity: 0.9;
    }

    #loginBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #4b0082;
      text-decoration: none;
      font-weight: bold;
    }

    .back-home:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-box">

    <div class="logo">
      <h1>Daily Sheen</h1>
      <p>Truth • Speed • Reliability</p>
    </div>

    <h2>🔐 Admin Login</h2>

    <form id="loginForm">

      <div class="form-group">
        <label for="email">
          Admin Email
        </label>

        <input
          type="email"
          id="email"
          placeholder="admin@example.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">
          Password
        </label>

        <input
          type="password"
          id="password"
          placeholder="আপনার পাসওয়ার্ড"
          required
        >
      </div>

      <button
        type="submit"
        id="loginBtn"
      >
        Login
      </button>

    </form>

    <div id="message"></div>

    <a
      href="index.html"
      class="back-home"
    >
      ← Back to Daily Sheen
    </a>

  </div>

  <!-- Firebase Configuration -->
  <script src="firebase-config.js"></script>

  <!-- Firebase SDK -->
  <script type="module">

    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


    // Initialize Firebase

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);


    // Login Form

    const loginForm =
      document.getElementById("loginForm");

    const loginBtn =
      document.getElementById("loginBtn");

    const message =
      document.getElementById("message");


    loginForm.addEventListener(
      "submit",
      async function(event) {

        event.preventDefault();

        const email =
          document.getElementById("email")
          .value
          .trim();

        const password =
          document.getElementById("password")
          .value;


        message.textContent =
          "Login হচ্ছে...";

        message.style.color =
          "#4b0082";

        loginBtn.disabled = true;


        try {

          const userCredential =
            await signInWithEmailAndPassword(
              auth,
              email,
              password
            );


          const user =
            userCredential.user;


          message.textContent =
            "✅ Login সফল হয়েছে!";

          message.style.color =
            "green";


          // Admin Dashboard

          setTimeout(function() {

            window.location.href =
              "admin.html";

          }, 1000);


        } catch (error) {

          console.error(error);


          message.textContent =
            "❌ Email অথবা Password ভুল হয়েছে।";


          message.style.color =
            "red";


          loginBtn.disabled =
            false;

        }

      }

    );

  </script>

</body>
</html>
