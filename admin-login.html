<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Admin Login | Daily Sheen</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;

      font-family: Arial, sans-serif;

      background: linear-gradient(
        135deg,
        #6a11cb,
        #2575fc
      );
    }

    .login-box {
      width: 100%;
      max-width: 420px;

      padding: 35px 25px;

      background: rgba(255, 255, 255, 0.95);

      border-radius: 20px;

      box-shadow:
        0 15px 40px
        rgba(0, 0, 0, 0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 90px;
      height: 90px;

      object-fit: contain;

      border-radius: 50%;
    }

    .login-box h1 {
      text-align: center;

      font-size: 25px;

      color: #4b0082;

      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;

      color: #666;

      font-size: 14px;

      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;

      margin-bottom: 7px;

      font-weight: bold;

      color: #333;
    }

    .form-group input {
      width: 100%;

      padding: 14px;

      border: 1px solid #ddd;

      border-radius: 10px;

      font-size: 16px;

      outline: none;

      transition: 0.3s;
    }

    .form-group input:focus {
      border-color: #6a11cb;

      box-shadow:
        0 0 0 3px
        rgba(106, 17, 203, 0.12);
    }

    #loginBtn {
      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 10px;

      background: linear-gradient(
        135deg,
        #6a11cb,
        #2575fc
      );

      color: white;

      font-size: 17px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.3s;
    }

    #loginBtn:hover {
      transform: translateY(-2px);

      box-shadow:
        0 8px 20px
        rgba(37, 117, 252, 0.3);
    }

    #loginBtn:disabled {
      opacity: 0.7;

      cursor: not-allowed;

      transform: none;
    }

    #message {
      min-height: 25px;

      margin-top: 18px;

      text-align: center;

      font-size: 14px;

      font-weight: bold;
    }

    .back-home {
      display: block;

      margin-top: 20px;

      text-align: center;

      color: #4b0082;

      text-decoration: none;

      font-size: 14px;
    }

    .back-home:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 30px 20px;
      }

      .login-box h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="login-box">

    <!-- Logo -->
    <div class="logo">
      <img
        src="assets/logo.png"
        alt="Daily Sheen Logo"
      >
    </div>

    <!-- Title -->
    <h1>Daily Sheen Admin</h1>

    <p class="subtitle">
      Admin Panel-এ প্রবেশ করতে Login করুন
    </p>

    <!-- Login Form -->
    <form id="loginForm">

      <!-- Email -->
      <div class="form-group">

        <label for="email">
          Email Address
        </label>

        <input
          type="email"
          id="email"
          placeholder="আপনার Email লিখুন"
          autocomplete="email"
          required
        >

      </div>

      <!-- Password -->
      <div class="form-group">

        <label for="password">
          Password
        </label>

        <input
          type="password"
          id="password"
          placeholder="আপনার Password লিখুন"
          autocomplete="current-password"
          required
        >

      </div>

      <!-- Login Button -->
      <button
        type="submit"
        id="loginBtn"
      >
        Login
      </button>

      <!-- Message -->
      <div id="message"></div>

    </form>

    <!-- Back Home -->
    <a
      href="index.html"
      class="back-home"
    >
      ← Back to Daily Sheen
    </a>

  </div>


  <!-- ============================= -->
  <!-- Firebase Login Script -->
  <!-- ============================= -->

  <script type="module">

    import {
      getAuth,
      signInWithEmailAndPassword
    } from
    "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


    import { app }
    from "./firebase-config.js";


    // =============================
    // Firebase Authentication
    // =============================

    const auth = getAuth(app);


    // =============================
    // HTML Elements
    // =============================

    const loginForm =
      document.getElementById("loginForm");

    const loginBtn =
      document.getElementById("loginBtn");

    const message =
      document.getElementById("message");


    // =============================
    // Show Message
    // =============================

    function showMessage(
      text,
      type = "error"
    ) {

      message.textContent = text;

      if (type === "success") {

        message.style.color = "#00853f";

      } else {

        message.style.color = "#d00000";

      }

    }


    // =============================
    // Login
    // =============================

    loginForm.addEventListener(
      "submit",
      async function (event) {

        event.preventDefault();


        // Get Input Values

        const email =
          document
            .getElementById("email")
            .value
            .trim();


        const password =
          document
            .getElementById("password")
            .value;


        // Empty Input Check

        if (!email || !password) {

          showMessage(
            "Email এবং Password দিন।"
          );

          return;

        }


        // Loading

        loginBtn.disabled = true;

        loginBtn.textContent =
          "Logging in...";

        showMessage(
          "Login হচ্ছে...",
          "success"
        );


        try {

          // Firebase Login

          const userCredential =
            await signInWithEmailAndPassword(
              auth,
              email,
              password
            );


          // Logged in User

          const user =
            userCredential.user;


          console.log(
            "Login Success:",
            user.email
          );


          // Success Message

          showMessage(
            "✅ Login সফল হয়েছে। Dashboard-এ নেওয়া হচ্ছে...",
            "success"
          );


          // Go to Admin Dashboard

          setTimeout(
            function () {

              window.location.href =
                "admin-dashboard.html";

            },
            1000
          );


        } catch (error) {

          console.error(
            "Login Error:",
            error
          );


          // Default Error

          let errorMessage =
            "Login করা যাচ্ছে না। আবার চেষ্টা করুন।";


          // Firebase Error Handling

          if (
            error.code ===
            "auth/invalid-credential"
          ) {

            errorMessage =
              "❌ Email অথবা Password ভুল।";


          } else if (
            error.code ===
            "auth/invalid-email"
          ) {

            errorMessage =
              "❌ সঠিক Email Address দিন।";


          } else if (
            error.code ===
            "auth/user-not-found"
          ) {

            errorMessage =
              "❌ এই Email দিয়ে কোনো Admin Account পাওয়া যায়নি।";


          } else if (
            error.code ===
            "auth/wrong-password"
          ) {

            errorMessage =
              "❌ Password ভুল হয়েছে।";


          } else if (
            error.code ===
            "auth/user-disabled"
          ) {

            errorMessage =
              "❌ এই Admin Account বন্ধ করা হয়েছে।";


          } else if (
            error.code ===
            "auth/too-many-requests"
          ) {

            errorMessage =
              "⚠️ অনেকবার চেষ্টা করা হয়েছে। কিছুক্ষণ পরে আবার চেষ্টা করুন।";


          } else if (
            error.code ===
            "auth/operation-not-allowed"
          ) {

            errorMessage =
              "❌ Firebase Authentication-এ Email/Password Login চালু করা হয়নি।";


          } else if (
            error.code ===
            "auth/network-request-failed"
          ) {

            errorMessage =
              "❌ Internet Connection সমস্যা হয়েছে।";


          } else {

            errorMessage =
              "❌ " +
              (
                error.message ||
                "Login ব্যর্থ হয়েছে।"
              );

          }


          // Show Error

          showMessage(
            errorMessage
          );


          // Reset Button

          loginBtn.disabled = false;

          loginBtn.textContent =
            "Login";

        }

      }
    );

  </script>

</body>
</html>
