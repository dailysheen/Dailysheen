<!DOCTYPE html>
<html lang="bn">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Daily Sheen Admin Dashboard</title>

  <link
    rel="stylesheet"
    href="admin.css"
  >

</head>


<body>


<!-- ==========================================
     Admin Header
========================================== -->

<header class="admin-header">

  <div class="admin-logo">

    <img
      src="assets/logo.png"
      alt="Daily Sheen"
    >

    <div>

      <h2>Daily Sheen</h2>

      <p>Admin Dashboard</p>

    </div>

  </div>


  <button
    id="logoutBtn"
    class="logout-btn"
  >

    🚪 Logout

  </button>

</header>



<!-- ==========================================
     Main Dashboard
========================================== -->

<main class="dashboard">


  <!-- ========================================
       Welcome Section
  ========================================= -->

  <section class="welcome-card">

    <h1>
      👋 Welcome to Daily Sheen Admin
    </h1>

    <p>
      এখান থেকে আপনার ওয়েবসাইটের News
      পরিচালনা করতে পারবেন।
    </p>

  </section>



  <!-- ========================================
       Statistics
  ========================================= -->

  <section class="stats-grid">


    <div class="stat-card">

      <h3>📰 Total News</h3>

      <strong id="totalNews">
        0
      </strong>

    </div>


    <div class="stat-card">

      <h3>🏷️ Categories</h3>

      <strong id="totalCategories">
        0
      </strong>

    </div>


    <div class="stat-card">

      <h3>👤 Admin</h3>

      <strong id="adminEmail">
        Loading...
      </strong>

    </div>


  </section>



  <!-- ========================================
       Add News
  ========================================= -->

  <section class="news-form-card">


    <h2>
      ➕ Add New News
    </h2>


    <form id="newsForm">


      <!-- Category -->

      <label for="newsCategory">
        Category
      </label>


      <select
        id="newsCategory"
        required
      >

        <option value="">
          Select Category
        </option>

        <option value="বাংলাদেশ">
          বাংলাদেশ
        </option>

        <option value="আন্তর্জাতিক">
          আন্তর্জাতিক
        </option>

        <option value="রাজনীতি">
          রাজনীতি
        </option>

        <option value="স্বাস্থ্য">
          স্বাস্থ্য
        </option>

        <option value="রোগ ও চিকিৎসা">
          রোগ ও চিকিৎসা
        </option>

        <option value="প্রযুক্তি">
          প্রযুক্তি
        </option>

        <option value="খেলাধুলা">
          খেলাধুলা
        </option>

        <option value="চাকরি">
          চাকরি
        </option>

      </select>



      <!-- News Title -->

      <label for="newsTitle">
        News Title
      </label>


      <input
        type="text"
        id="newsTitle"
        placeholder="সংবাদের শিরোনাম লিখুন"
        required
      >



      <!-- News Description -->

      <label for="newsDescription">
        News Description
      </label>


      <textarea
        id="newsDescription"
        rows="6"
        placeholder="সংবাদের বিস্তারিত লিখুন..."
        required
      ></textarea>



      <!-- Image URL -->

      <label for="newsImage">
        Image URL
      </label>


      <input
        type="url"
        id="newsImage"
        placeholder="https://example.com/image.jpg"
      >



      <!-- Submit -->

      <button
        type="submit"
        id="saveNewsBtn"
        class="save-btn"
      >

        💾 Save News

      </button>


      <!-- Message -->

      <p id="dashboardMsg"></p>


    </form>


  </section>



  <!-- ========================================
       News List
  ========================================= -->

  <section class="news-list-card">


    <div class="section-header">

      <h2>
        📰 Recent News
      </h2>


      <button
        id="refreshBtn"
        class="refresh-btn"
      >

        🔄 Refresh

      </button>

    </div>


    <div id="newsList">

      <p class="empty-message">
        এখনো কোনো News যোগ করা হয়নি।
      </p>

    </div>


  </section>


</main>



<!-- ==========================================
     Firebase Dashboard JS
========================================== -->


<script
  type="module"
  src="admin-dashboard.js"
></script>


</body>

</html>
