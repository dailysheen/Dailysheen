<!DOCTYPE html>
<html lang="bn">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Daily Sheen Admin Dashboard"
  >

  <title>Daily Sheen | Admin Dashboard</title>

  <!-- Admin CSS -->
  <link
    rel="stylesheet"
    href="admin.css"
  >

</head>


<body>


<!-- ==================================================
     ADMIN HEADER
================================================== -->

<header class="admin-header">

  <div class="admin-brand">

    <img
      src="assets/logo.png"
      alt="Daily Sheen Logo"
      class="admin-logo"
    >

    <div class="brand-text">

      <h2>
        Daily Sheen
      </h2>

      <p>
        Admin Dashboard
      </p>

    </div>

  </div>


  <button
    type="button"
    id="logoutBtn"
    class="logout-btn"
  >

    🚪 Logout

  </button>

</header>



<!-- ==================================================
     MAIN DASHBOARD
================================================== -->

<main class="dashboard">


  <!-- ==================================================
       WELCOME
  ================================================== -->

  <section class="welcome-card">

    <h1>
      👋 Welcome to Daily Sheen Admin
    </h1>

    <p>
      এখান থেকে আপনার ওয়েবসাইটের News পরিচালনা করতে পারবেন।
    </p>

  </section>



  <!-- ==================================================
       GLOBAL MESSAGE
  ================================================== -->

  <div
    id="dashboardMsg"
    class="dashboard-message"
    aria-live="polite"
  ></div>



  <!-- ==================================================
       STATISTICS
  ================================================== -->

  <section class="stats-grid">


    <!-- TOTAL NEWS -->

    <div class="stat-card">

      <div class="stat-icon">
        📰
      </div>

      <div class="stat-info">

        <h3>
          Total News
        </h3>

        <strong id="totalNews">
          0
        </strong>

      </div>

    </div>



    <!-- TOTAL CATEGORIES -->

    <div class="stat-card">

      <div class="stat-icon">
        🏷️
      </div>

      <div class="stat-info">

        <h3>
          Categories
        </h3>

        <strong id="totalCategories">
          0
        </strong>

      </div>

    </div>



    <!-- ADMIN -->

    <div class="stat-card">

      <div class="stat-icon">
        👤
      </div>

      <div class="stat-info">

        <h3>
          Admin
        </h3>

        <strong
          id="adminEmail"
          class="admin-email"
        >
          Loading...
        </strong>

      </div>

    </div>


  </section>



  <!-- ==================================================
       ADD NEWS
  ================================================== -->

  <section class="dashboard-card">


    <div class="card-title">

      <h2>
        ➕ Add New News
      </h2>

    </div>



    <form
      id="newsForm"
      class="news-form"
      autocomplete="off"
    >


      <!-- CATEGORY -->

      <div class="form-group">

        <label for="newsCategory">
          Category
        </label>

        <select
          id="newsCategory"
          required
        >

          <option value="">
            Select Category
          </option>

          <option value="বাংলাদেশ">
            বাংলাদেশ
          </option>

          <option value="আন্তর্জাতিক">
            আন্তর্জাতিক
          </option>

          <option value="রাজনীতি">
            রাজনীতি
          </option>

          <option value="স্বাস্থ্য">
            স্বাস্থ্য
          </option>

          <option value="রোগ ও চিকিৎসা">
            রোগ ও চিকিৎসা
          </option>

          <option value="প্রযুক্তি">
            প্রযুক্তি
          </option>

          <option value="খেলাধুলা">
            খেলাধুলা
          </option>

          <option value="চাকরি">
            চাকরি
          </option>

        </select>

      </div>



      <!-- TITLE -->

      <div class="form-group">

        <label for="newsTitle">
          News Title
        </label>

        <input
          type="text"
          id="newsTitle"
          placeholder="সংবাদের শিরোনাম লিখুন"
          required
        >

      </div>



      <!-- DESCRIPTION -->

      <div class="form-group">

        <label for="newsDescription">
          News Description
        </label>

        <textarea
          id="newsDescription"
          rows="7"
          placeholder="সংবাদের বিস্তারিত লিখুন..."
          required
        ></textarea>

      </div>



      <!-- IMAGE URL -->

      <div class="form-group">

        <label for="newsImage">
          Image URL
        </label>

        <input
          type="url"
          id="newsImage"
          placeholder="https://example.com/image.jpg"
        >

      </div>



      <!-- SAVE BUTTON -->

      <button
        type="submit"
        id="saveNewsBtn"
        class="save-btn"
      >

        💾 Save News

      </button>


    </form>


  </section>



  <!-- ==================================================
       RECENT NEWS
  ================================================== -->

  <section class="dashboard-card news-section">


    <div class="section-header">

      <h2>
        📰 Recent News
      </h2>


      <button
        type="button"
        id="refreshBtn"
        class="refresh-btn"
      >

        🔄 Refresh

      </button>

    </div>



    <!-- NEWS LIST -->

    <div
      id="newsList"
      class="news-grid"
    >

      <div class="empty-news">

        <p>
          📰 এখনো কোনো News Publish করা হয়নি।
        </p>

      </div>

    </div>


  </section>


</main>



<!-- ==================================================
     FIREBASE ADMIN DASHBOARD JS
================================================== -->

<script
  type="module"
  src="admin-dashboard.js"
></script>


</body>

</html>
