<!DOCTYPE html>
<html lang="bn">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Daily Sheen Admin Dashboard"
  >

  <title>Daily Sheen Admin Dashboard</title>


  <!-- Admin CSS -->
  <link
    rel="stylesheet"
    href="admin.css"
  >

</head>


<body>


<!-- ==================================================
     ADMIN HEADER
================================================== -->

<header class="admin-header">

  <div class="admin-logo">

    <img
      src="assets/logo.png"
      alt="Daily Sheen Logo"
    >

    <div class="admin-logo-text">

      <h2>
        Daily Sheen
      </h2>

      <p>
        Admin Dashboard
      </p>

    </div>

  </div>


  <button
    type="button"
    id="logoutBtn"
    class="logout-btn"
  >

    🚪 Logout

  </button>

</header>



<!-- ==================================================
     MAIN DASHBOARD
================================================== -->

<main class="dashboard">


  <!-- ==================================================
       WELCOME CARD
  ================================================== -->

  <section class="welcome-card">

    <h1>
      👋 Welcome to Daily Sheen Admin
    </h1>

    <p>
      এখান থেকে আপনার ওয়েবসাইটের News পরিচালনা করতে পারবেন।
    </p>

  </section>



  <!-- ==================================================
       DASHBOARD MESSAGE
  ================================================== -->

  <div
    id="dashboardMsg"
    class="dashboard-message"
    aria-live="polite"
  ></div>



  <!-- ==================================================
       STATISTICS
  ================================================== -->

  <section class="stats-grid">


    <!-- Total News -->

    <div class="stat-card">

      <div class="stat-icon">
        📰
      </div>

      <h3>
        Total News
      </h3>

      <strong
        id="totalNews"
        class="number"
      >
        0
      </strong>

    </div>



    <!-- Total Categories -->

    <div class="stat-card">

      <div class="stat-icon">
        🏷️
      </div>

      <h3>
        Categories
      </h3>

      <strong
        id="totalCategories"
        class="number"
      >
        0
      </strong>

    </div>



    <!-- Admin Email -->

    <div class="stat-card">

      <div class="stat-icon">
        👤
      </div>

      <h3>
        Admin
      </h3>

      <strong
        id="adminEmail"
        class="admin-email"
      >
        Loading...
      </strong>

    </div>


  </section>



  <!-- ==================================================
       ADD NEWS CARD
  ================================================== -->

  <section class="dashboard-card news-form-card">


    <div class="card-header">

      <h2>
        ➕ Add New News
      </h2>

    </div>



    <!-- NEWS FORM -->

    <form
      id="newsForm"
      autocomplete="off"
    >


      <!-- Category -->

      <div class="form-group">

        <label for="newsCategory">
          Category
        </label>

        <select
          id="newsCategory"
          name="category"
          required
        >

          <option value="">
            Select Category
          </option>

          <option value="বাংলাদেশ">
            বাংলাদেশ
          </option>

          <option value="আন্তর্জাতিক">
            আন্তর্জাতিক
          </option>

          <option value="রাজনীতি">
            রাজনীতি
          </option>

          <option value="স্বাস্থ্য">
            স্বাস্থ্য
          </option>

          <option value="রোগ ও চিকিৎসা">
            রোগ ও চিকিৎসা
          </option>

          <option value="প্রযুক্তি">
            প্রযুক্তি
          </option>

          <option value="খেলাধুলা">
            খেলাধুলা
          </option>

          <option value="চাকরি">
            চাকরি
          </option>

        </select>

      </div>



      <!-- News Title -->

      <div class="form-group">

        <label for="newsTitle">
          News Title
        </label>

        <input
          type="text"
          id="newsTitle"
          name="title"
          placeholder="সংবাদের শিরোনাম লিখুন"
          required
        >

      </div>



      <!-- News Description -->

      <div class="form-group">

        <label for="newsDescription">
          News Description
        </label>

        <textarea
          id="newsDescription"
          name="description"
          rows="6"
          placeholder="সংবাদের বিস্তারিত লিখুন..."
          required
        ></textarea>

      </div>



      <!-- Image URL -->

      <div class="form-group">

        <label for="newsImage">
          Image URL
        </label>

        <input
          type="url"
          id="newsImage"
          name="image"
          placeholder="https://example.com/image.jpg"
        >

      </div>



      <!-- Save Button -->

      <button
        type="submit"
        id="saveNewsBtn"
        class="save-btn"
      >

        💾 Save News

      </button>


      <!-- Form Message -->

      <p
        id="formMessage"
        class="form-message"
        aria-live="polite"
      ></p>


    </form>


  </section>



  <!-- ==================================================
       RECENT NEWS CARD
  ================================================== -->

  <section class="dashboard-card news-list-card">


    <!-- Section Header -->

    <div class="section-header">

      <h2>
        📰 Recent News
      </h2>


      <button
        type="button"
        id="refreshBtn"
        class="refresh-btn"
      >

        🔄 Refresh

      </button>

    </div>



    <!-- News List -->

    <div
      id="newsList"
      class="news-grid"
    >

      <div class="empty-message">

        এখনো কোনো News যোগ করা হয়নি।

      </div>

    </div>


  </section>


</main>



<!-- ==================================================
     FIREBASE ADMIN DASHBOARD JAVASCRIPT
================================================== -->

<script
  type="module"
  src="admin-dashboard.js"
></script>


</body>

</html>
